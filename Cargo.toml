[package]
name = "ziro"
version = "0.1.1"
description = "The better text editor"
authors = ["Faizeen Hoque <me@faizeenhoque.dev>"]
license = "MIT"
edition = "2024"

[dependencies]
color-eyre = "0.6.3"
crossterm = "0.29.0"
ratatui = "0.30.2"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
strip = true